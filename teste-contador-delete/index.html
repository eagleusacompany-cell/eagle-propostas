<!doctype html><html><head><meta charset=utf-8><title>counter test</title></head>
<body style="background:#07080b;color:#e8c96a;font-family:sans-serif;padding:40px">
<div class="eg-preco-final" data-final="497">$0.00</div>
<script>
document.querySelectorAll('.eg-preco-final').forEach(function(el){
var alvo=parseFloat(el.getAttribute('data-final'))||0;var contado=false;
var alvoFmt="$"+alvo.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
var obs2=new IntersectionObserver(function(entries){entries.forEach(function(en){if(en.isIntersecting&&!contado){contado=true;var inicio=performance.now(),dur=900;
function passo(agora){var pr=Math.min((agora-inicio)/dur,1);var eased=1-Math.pow(1-pr,3);el.textContent=pr>=1?alvoFmt:"$"+(alvo*eased).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});if(pr<1)requestAnimationFrame(passo);}
requestAnimationFrame(passo);setTimeout(function(){el.textContent=alvoFmt;},dur+200);obs2.unobserve(el);}});},{threshold:.4});obs2.observe(el);});
</script></body></html>
